<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alphaville Exclusive Properties</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90vh;
    }

    .chat-wrapper {
      width: 420px;
      height: 700px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c9a84c, #f0d080);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-info h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .header-info p {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f8f9fa;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .message {
      display: flex;
      gap: 8px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.bot { align-self: flex-start; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c9a84c, #f0d080);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .msg-avatar {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.bot .msg-bubble {
      background: #fff;
      color: #333;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .message.user .msg-bubble {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 4px;
      text-align: right;
    }

    .message.bot .msg-time { text-align: left; }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: #fff;
      padding: 12px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      gap: 5px;
      align-items: center;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      background: #c9a84c;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .chat-input-area {
      padding: 16px 20px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-input-area textarea {
      flex: 1;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 100px;
      transition: border-color 0.2s;
      color: #333;
    }

    .chat-input-area textarea:focus {
      border-color: #c9a84c;
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #c9a84c, #f0d080);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.2s;
    }

    .send-btn:hover { transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: #1a1a2e;
    }

    .config-bar {
      background: #fffbf0;
      border-bottom: 1px solid #f0e8cc;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #8a7040;
    }

    .config-bar input {
      flex: 1;
      border: 1px solid #e0d0a0;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      background: #fff;
      color: #333;
      outline: none;
    }

    .config-bar input:focus { border-color: #c9a84c; }

    .lead-card {
      background: #f0f8f0;
      border: 1px solid #b8ddb8;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12px;
      color: #2d6a2d;
      margin-top: 4px;
    }

    .lead-card h4 {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #1a4a1a;
    }

    .lead-card .field {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      border-bottom: 1px solid #d0ead0;
    }

    .lead-card .field:last-child { border-bottom: none; }
    .lead-card .field span:first-child { opacity: 0.7; }
    .lead-card .field span:last-child { font-weight: 500; }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <div class="chat-header">
    <div class="avatar">🏠</div>
    <div class="header-info">
      <h2>Jorge — Alphaville Exclusive</h2>
      <p><span class="status-dot"></span>Online agora</p>
    </div>
  </div>

  <div class="config-bar">
    <span>Webhook:</span>
    <input type="text" id="webhookUrl" placeholder="https://edimsoul.app.n8n.cloud/webhook/jorge" />
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message bot">
      <div class="msg-avatar">🤵</div>
      <div>
        <div class="msg-bubble">Olá! Clique em enviar para iniciar o atendimento com o Jorge.</div>
        <div class="msg-time">agora</div>
      </div>
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>

  <div class="chat-input-area">
    <textarea id="userInput" placeholder="Digite sua mensagem..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
  let isWaiting = false;

  const input = document.getElementById('userInput');
  const messages = document.getElementById('chatMessages');
  const typing = document.getElementById('typingIndicator');
  const sendBtn = document.getElementById('sendBtn');

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  function getTime() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = 'message ' + type;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = type === 'bot' ? '🤵' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    const wrapper = document.createElement('div');
    wrapper.appendChild(bubble);
    wrapper.appendChild(time);

    div.appendChild(avatar);
    div.appendChild(wrapper);

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function addLeadCard(data) {
    if (data.passo !== 8) return;

    const div = document.createElement('div');
    div.className = 'message bot';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '✅';

    const card = document.createElement('div');
    card.className = 'lead-card';
    card.innerHTML = `
      <h4>Lead registrado com sucesso</h4>
      <div class="field"><span>Nome</span><span>${data.nome || '—'}</span></div>
      <div class="field"><span>E-mail</span><span>${data.email || '—'}</span></div>
      <div class="field"><span>Tipo</span><span>${data.tipo_imovel || '—'}</span></div>
      <div class="field"><span>Modalidade</span><span>${data.modalidade || '—'}</span></div>
      <div class="field"><span>Orçamento</span><span>${data.orcamento > 0 ? 'R$ ' + Number(data.orcamento).toLocaleString('pt-BR') : '—'}</span></div>
      <div class="field"><span>Data</span><span>${data.data || '—'}</span></div>
      <div class="field"><span>Horário</span><span>${data.horario || '—'}</span></div>
    `;

    div.appendChild(avatar);
    div.appendChild(card);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isWaiting) return;

    const webhookUrl = document.getElementById('webhookUrl').value.trim();
    if (!webhookUrl) {
      alert('Cole a URL do seu webhook no campo acima!');
      return;
    }

    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';

    isWaiting = true;
    sendBtn.disabled = true;
    typing.classList.add('visible');
    messages.scrollTop = messages.scrollHeight;

    try {
      const response = await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId: sessionId })
      });

      const data = await response.json();

      typing.classList.remove('visible');

      if (data.resposta) {
        addMessage(data.resposta, 'bot');
        addLeadCard(data);
      } else if (data.message) {
        addMessage('Aguardando processamento...', 'bot');
      } else {
        addMessage(JSON.stringify(data), 'bot');
      }

    } catch (err) {
      typing.classList.remove('visible');
      addMessage('Erro ao conectar com o servidor. Verifique a URL do webhook.', 'bot');
      console.error(err);
    }

    isWaiting = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
